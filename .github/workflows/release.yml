name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: plugin

  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "Tag version:     $TAG_VERSION"
          echo "Package version: $PACKAGE_VERSION"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "❌ Version mismatch: tag $TAG_VERSION ≠ package.json $PACKAGE_VERSION"
            echo "   Update package.json version before tagging."
            exit 1
          fi
          echo "✅ Versions match"

  release:
    name: Create GitHub Release
    needs: [quality-gate, version-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for changelog fallback

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Read release notes
        id: release_notes
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            echo "Found RELEASE_NOTES.md — using pre-written release notes"
            {
              echo "body<<EOF"
              cat RELEASE_NOTES.md
              echo ""
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "RELEASE_NOTES.md not found — falling back to git log"
            PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
            CURRENT_TAG="${GITHUB_REF_NAME}"
            {
              echo "body<<EOF"
              echo "## Changes"
              echo ""
              if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$CURRENT_TAG" ]; then
                git log "${PREV_TAG}..${CURRENT_TAG}" --pretty=format:"- %s" --no-merges
              else
                git log --pretty=format:"- %s" --no-merges -20
              fi
              echo ""
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/world-heatmap-card.js
          body: |
            ${{ steps.release_notes.outputs.body }}

            ---
            **Installation:** Install via HACS (custom repository), or download `world-heatmap-card.js` and copy it into `config/www/ha-world-heatmap-card/`.
